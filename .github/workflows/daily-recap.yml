name: Daily Portfolio Recap
on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: dump
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: 1jK6MlFxO6Im0eBfUP1eOjzW0Nii87jABEHiBnsjP52U
        run: |
          cat << 'EOF' > dump.py
          import os
          import json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          
          creds_json = os.environ.get('GOOGLE_SHEETS_CREDENTIALS')
          creds_dict = json.loads(creds_json)
          credentials = service_account.Credentials.from_service_account_info(
              creds_dict,
              scopes=['https://www.googleapis.com/auth/spreadsheets']
          )
          service = build('sheets', 'v4', credentials=credentials)
          sheet_id = os.environ.get('GOOGLE_SHEETS_ID')
          metadata = service.spreadsheets().get(spreadsheetId=sheet_id).execute()
          
          print("SHEETS LIST:", flush=True)
          for sheet in metadata.get('sheets', []):
              title = sheet['properties']['title']
              print(f"--- Sheet: {title} ---", flush=True)
              try:
                  result = service.spreadsheets().values().get(spreadsheetId=sheet_id, range=title).execute()
                  values = result.get('values', [])
                  print(f"Total Rows: {len(values)}", flush=True)
                  for i, row in enumerate(values[:20]):
                      print(f"{i}: {row}", flush=True)
              except Exception as e:
                  print(e)
          EOF
          pip install google-api-python-client google-auth
          python dump.py
